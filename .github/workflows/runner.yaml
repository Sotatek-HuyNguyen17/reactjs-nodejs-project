name: ARC Runner

on:
  push:
    branches:
      - feature/k8s-executor

jobs:
  build:
    runs-on: arc-runner-set
    services:
      buildkitd:
        image: moby/buildkit:v0.12.0
        options: --privileged
        ports:
          - 1234:1234

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          endpoint: tcp://localhost:1234

      # Replace Azure Login with Docker Login
      - name: Login to Docker Registry
        uses: docker/login-action@v3
        with:
          # Leave 'registry' blank for Docker Hub,
          # or set to 'my-private-registry.com'
          registry: ${{ secrets.DOCKER_REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Update tags to your registry format
          tags: |
            ${{ secrets.DOCKER_REGISTRY_URL }}/myapp:${{ github.sha }}
            ${{ secrets.DOCKER_REGISTRY_URL }}/myapp:latest
          # Cache settings updated for Docker Registry
          cache-from: type=registry,ref=${{ secrets.DOCKER_REGISTRY_URL }}/myapp:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_REGISTRY_URL }}/myapp:buildcache,mode=max
