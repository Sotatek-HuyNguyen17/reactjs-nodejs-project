name: ARC Runner

on:
  push:
    branches:
      - feature/k8s-executor

jobs:
  build:
    runs-on: arc-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install buildctl
        run: |
          curl -sSL https://github.com/moby/buildkit/releases/download/v0.12.0/buildkit-v0.12.0.linux-amd64.tar.gz \
            | tar -xz -C /tmp --strip-components=1 bin/buildctl
          chmod +x /tmp/buildctl
          echo "/tmp" >> $GITHUB_PATH

      - name: Login to registry
        run: |
          mkdir -p ~/.docker
          AUTH=$(echo -n "${{ secrets.DOCKER_USERNAME }}:${{ secrets.DOCKER_PASSWORD }}" | base64)
          echo "{\"auths\":{\"${{ secrets.REPOSITORY_URI }}\":{\"auth\":\"${AUTH}\"}}}" > ~/.docker/config.json

      - name: Build and push
        run: |
          buildctl --addr tcp://buildkitd.arc-runners.svc.cluster.local:1234 build \
            --frontend=dockerfile.v0 \
            --local context=./backend \
            --local dockerfile=./backend \
            --output type=image,name=${{ secrets.REPOSITORY_URI }}/nodejsmysql:${{ github.sha }},push=true \
            --export-cache type=registry,ref=${{ secrets.REPOSITORY_URI }}/nodejsmysql:buildcache,mode=max \
            --import-cache type=registry,ref=${{ secrets.REPOSITORY_URI }}/nodejsmysql:buildcache
